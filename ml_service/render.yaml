services:
  - type: web
    name: eris-ml-service
    runtime: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pip install -r ml_service/requirements.txt
    startCommand: uvicorn ml_service.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false          # Same PostgreSQL URL as backend
      - key: REDIS_HOST
        sync: false          # Render Redis host
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false          # Render Redis password
      - key: LOG_LEVEL
        value: INFO
      - key: ML_SERVICE_HOST
        value: "0.0.0.0"
